{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SwitchMap</title>
    <link rel="stylesheet" href="{% static 'inventory/switchmap.css' %}">
</head>
<body>
    <main class="page-shell" style="max-width:520px;margin:60px auto;">
        <section class="surface-card form-card-main">
            <h1 class="page-title">ورود به SwitchMap</h1>
            <p class="page-subtitle">برای ادامه باید Login کنی.</p>
            {% if form.errors %}
                <div class="flash-message error">نام کاربری یا رمز عبور اشتباه است.</div>
            {% endif %}
            <form method="post" class="stack-form">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="field-row">
                    <label>Username</label>
                    <input class="input ltr" type="text" name="username" autofocus autocomplete="username" required>
                </div>
                <div class="field-row">
                    <label>Password</label>
                    <input class="input ltr" type="password" name="password" autocomplete="current-password" required>
                </div>
                <button class="btn btn-primary btn-block" type="submit">Login</button>
            </form>
        </section>
    </main>
</body>
</html>
